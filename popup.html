<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=280">
  <title>Safe Image Converter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <img src="icons/icon48.png" alt="" class="header-icon" width="16" height="16">
    <span class="header-title">Safe Image Converter</span>
  </header>

  <!-- Format Selector -->
  <section class="section">
    <label class="section-label">Default format</label>
    <div class="format-group" role="group" aria-label="Default format">
      <button class="format-btn" data-format="png" aria-label="Set default format to PNG" aria-pressed="false">PNG</button>
      <button class="format-btn" data-format="jpg" aria-label="Set default format to JPG" aria-pressed="false">JPG</button>
      <button class="format-btn" data-format="webp" aria-label="Set default format to WebP" aria-pressed="false">WebP</button>
    </div>
  </section>

  <!-- JPG Quality -->
  <section class="section">
    <div class="quality-header">
      <label class="section-label" for="quality-slider">Output quality</label>
      <span class="quality-value" id="quality-value">85%</span>
    </div>
    <input
      type="range"
      id="quality-slider"
      class="quality-slider"
      min="1"
      max="100"
      value="85"
      aria-label="Output quality"
    >
  </section>

  <!-- Conversion Counter -->
  <section class="counter-section" aria-label="0 images converted">
    <span class="counter-check">&#10003;</span>
    <span class="counter-text" id="counter-text">0 images converted</span>
  </section>

  <!-- Trust Badge -->
  <section class="trust-section">
    <span class="trust-lock">&#128274;</span>
    <span class="trust-text">Your images never leave your browser</span>
  </section>

  <!-- Rate Prompt (hidden by default) -->
  <section class="rate-section" id="rate-section" hidden>
    <span class="rate-text">Enjoying this? Rate it on the Chrome Web Store</span>
    <a class="rate-link" id="rate-link" href="#" aria-label="Rate on Chrome Web Store">Rate</a>
    <button class="rate-dismiss" id="rate-dismiss" aria-label="Dismiss rating prompt">&times;</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
